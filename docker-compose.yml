services:
  mcp:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=8080
      - MCP_HTTP_HOST=0.0.0.0
      - AUTH_MODE=${AUTH_MODE:-env}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Required when AUTH_MODE=env
      - CHECKPOINT_CLIENT_ID=${CHECKPOINT_CLIENT_ID}
      - CHECKPOINT_CLIENT_SECRET=${CHECKPOINT_CLIENT_SECRET}
      # Optional: force region (us | eu | au | in). Auto-detected when omitted.
      - CHECKPOINT_REGION=${CHECKPOINT_REGION:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
