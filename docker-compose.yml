services:
  mcp:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=8080
      - AUTH_MODE=${AUTH_MODE:-env}
      - CHECKPOINT_CLIENT_ID=${CHECKPOINT_CLIENT_ID}
      - CHECKPOINT_CLIENT_SECRET=${CHECKPOINT_CLIENT_SECRET}
      - CHECKPOINT_BASE_URL=${CHECKPOINT_BASE_URL:-https://cloudinfra-gw.portal.checkpoint.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
